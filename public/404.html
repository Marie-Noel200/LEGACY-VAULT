<!DOCTYPE html><html lang="en"><head>
<link rel="icon" type="image/svg+xml" href="/img/icon.svg"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>404 — Page Not Found | Legacy Vault</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.err-num{font-size:clamp(5rem,15vw,9rem);font-weight:900;font-family:Inter,sans-serif;line-height:1;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
</style></head>
<body>
<div class="text-center px-4">
  <a href="/" class="d-inline-flex align-items-center gap-2 text-decoration-none mb-5"><img src="/img/logo.svg" height="44" alt="Legacy Vault"><span class="brand-text" style="font-size:1.2rem">Legacy<span>Vault</span></span></a>
  <div class="err-num">404</div>
  <h2 style="font-family:'Playfair Display',serif;color:var(--text);font-size:1.75rem;margin-bottom:.75rem">Page Not Found</h2>
  <p style="color:var(--text-2);font-size:1rem;max-width:420px;margin:0 auto 2rem;line-height:1.7">This page doesn't exist — but your legacy should.<br>Let's get you back to safety.</p>
  <div class="d-flex gap-3 justify-content-center flex-wrap">
    <a href="/" class="btn-vault-primary" style="padding:.875rem 2rem;font-size:.95rem"><i class="fas fa-home"></i>Go Home</a>
    <a href="/dashboard" class="btn-vault-outline" style="padding:.875rem 2rem;font-size:.95rem"><i class="fas fa-tachometer-alt"></i>Dashboard</a>
  </div>
  <div style="margin-top:3rem;display:inline-flex;align-items:center;gap:8px;background:#F0FDF4;border:1px solid #BBF7D0;color:var(--accent-d);padding:.4rem 1rem;border-radius:20px;font-size:.78rem;font-weight:600">
    <i class="fas fa-shield-alt"></i>Your vault is still secure
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body></html>
