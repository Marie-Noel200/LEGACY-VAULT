<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4F46E5"/><stop offset="100%" stop-color="#6366F1"/></linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22C55E"/><stop offset="100%" stop-color="#16A34A"/></linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Inner vault frame -->
  <rect x="4" y="4" width="24" height="24" rx="4" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <!-- Document (left) -->
  <rect x="6" y="15" width="8" height="10" rx="1.5" fill="rgba(255,255,255,0.15)"/>
  <line x1="7.5" y1="18" x2="12.5" y2="18" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
  <line x1="7.5" y1="20.5" x2="11.5" y2="20.5" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
  <!-- Lock body (right) -->
  <rect x="17" y="18" width="9" height="7" rx="2" fill="rgba(255,255,255,0.92)"/>
  <!-- Lock shackle -->
  <path d="M19.5 18v-2.5a2 2 0 0 1 4 0V18" stroke="rgba(255,255,255,0.92)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="21.5" cy="21" r="1.1" fill="url(#bg)"/>
  <rect x="21" y="21.5" width="1" height="1.8" rx=".5" fill="url(#bg)"/>
  <!-- Accent dot -->
  <circle cx="28" cy="4" r="3" fill="url(#ac)"/>
</svg>
