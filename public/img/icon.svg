<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="48" height="48" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Vault door inner border -->
  <rect x="7" y="8" width="34" height="32" rx="6" ry="6" fill="none" stroke="url(#fg)" stroke-width="1.5" opacity="0.4"/>

  <!-- Lock shackle -->
  <path d="M18 24 L18 19.5 C18 15.5 30 15.5 30 19.5 L30 24" stroke="url(#fg)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="14" y="24" width="20" height="14" rx="3.5" ry="3.5" fill="url(#fg)"/>

  <!-- Keyhole -->
  <circle cx="24" cy="30" r="2.8" fill="url(#bg)"/>
  <rect x="22.8" y="30" width="2.4" height="4.5" rx="1.2" fill="url(#bg)"/>
</svg>
