<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- ICON: Vault/Safe shape with rounded corners -->
  <rect x="2" y="4" width="40" height="40" rx="10" ry="10" fill="url(#iconGrad)"/>

  <!-- Vault door outline (inner rectangle) -->
  <rect x="8" y="10" width="28" height="28" rx="5" ry="5" fill="none" stroke="url(#lockGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Lock shackle (top arc) -->
  <path d="M17 22 L17 18.5 C17 15.5 27 15.5 27 18.5 L27 22" stroke="url(#lockGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Lock body (rectangle) -->
  <rect x="13" y="22" width="18" height="13" rx="3" ry="3" fill="url(#lockGrad)"/>

  <!-- Keyhole circle -->
  <circle cx="22" cy="27.5" r="2.5" fill="url(#iconGrad)"/>

  <!-- Keyhole slot -->
  <rect x="21" y="27.5" width="2" height="4" rx="1" fill="url(#iconGrad)"/>

  <!-- Document corner fold (top right of vault, subtle) -->
  <path d="M30 10 L35 10 L35 15" stroke="url(#lockGrad)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- TEXT: LEGACY -->
  <text
    x="52"
    y="22"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="400"
    font-size="13"
    letter-spacing="2"
    fill="#0F172A"
  >LEGACY</text>

  <!-- TEXT: VAULT -->
  <text
    x="52"
    y="38"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="15"
    letter-spacing="1"
    fill="#4F46E5"
  >VAULT</text>

  <!-- Subtle separator line between LEGACY and VAULT -->
  <line x1="52" y1="26" x2="148" y2="26" stroke="#E2E8F0" stroke-width="0.8"/>
</svg>
