<!DOCTYPE html><html lang="en"><head>
<link rel="icon" type="image/svg+xml" href="/img/icon.svg"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Forgot Password — Legacy Vault</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">
<style>
body{margin:0;padding:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:2.5rem;width:100%;max-width:440px;box-shadow:var(--shadow-lg)}
</style></head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" style="position:fixed;top:1rem;right:1rem;z-index:1000"><i class="fas fa-moon"></i></button>
<div class="auth-card">
  <div class="text-center mb-4">
    <a href="/" class="d-inline-block mb-3"><img src="/img/logo.svg" height="40" alt="Legacy Vault"></a>
    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;margin:0 auto .875rem;box-shadow:0 4px 16px rgba(79,70,229,.3)"><i class="fas fa-key" style="color:#fff;font-size:1.3rem"></i></div>
    <h3 style="font-family:'Playfair Display',serif;color:var(--text);font-size:1.5rem;margin-bottom:.25rem">Forgot Password?</h3>
    <p style="color:var(--text-3);font-size:.875rem;margin:0">Enter your email and we'll send you a reset link</p>
  </div>

  <!-- Step 1: Email form -->
  <div id="step-email">
    <div id="alert-box" style="display:none" class="mb-3"></div>
    <form id="forgot-form" class="form-vault" novalidate>
      <div class="mb-4">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
        </div>
      </div>
      <button type="submit" id="submit-btn" class="btn-vault-primary w-100 mb-3" style="padding:.875rem;font-size:.95rem;justify-content:center">
        <i class="fas fa-paper-plane"></i>Send Reset Link
      </button>
    </form>
  </div>

  <!-- Step 2: Success message -->
  <div id="step-success" style="display:none;text-align:center">
    <div style="width:72px;height:72px;border-radius:50%;background:#F0FDF4;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:2rem">✅</div>
    <h5 style="font-family:'Playfair Display',serif;color:var(--text);margin-bottom:.5rem">Check Your Email</h5>
    <p style="color:var(--text-2);font-size:.875rem;line-height:1.7;margin-bottom:1.5rem">
      If <strong id="sent-email"></strong> is registered, you'll receive a password reset link shortly.<br>
      The link expires in <strong>1 hour</strong>.
    </p>
    <div style="background:rgba(79,70,229,.06);border:1px solid #C7D2FE;border-radius:10px;padding:.875rem;margin-bottom:1.5rem;font-size:.82rem;color:var(--text-2)">
      <i class="fas fa-info-circle me-2" style="color:var(--primary)"></i>
      Check your spam folder if you don't see it within a few minutes.
    </div>
    <a href="/login" class="btn-vault-primary w-100" style="padding:.75rem;justify-content:center;text-decoration:none">
      <i class="fas fa-sign-in-alt"></i>Back to Sign In
    </a>
  </div>

  <div class="text-center mt-3">
    <a href="/login" style="color:var(--text-3);font-size:.82rem;text-decoration:none"><i class="fas fa-arrow-left me-1"></i>Back to Sign In</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  LV.Auth.requireGuest();
  document.getElementById('forgot-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var btn = document.getElementById('submit-btn');
    var ab = document.getElementById('alert-box');
    ab.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Sending...';
    var res = await LV.API.post('/auth/forgot-password', { email: email });
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send Reset Link';
    if (res && res.success) {
      document.getElementById('sent-email').textContent = email;
      document.getElementById('step-email').style.display = 'none';
      document.getElementById('step-success').style.display = 'block';
    } else {
      ab.style.display = 'block';
      ab.innerHTML = '<div class="alert-vault alert-vault-danger"><i class="fas fa-exclamation-circle"></i>' + (res ? res.message : 'Something went wrong. Please try again.') + '</div>';
    }
  });
});
</script>
</body></html>
